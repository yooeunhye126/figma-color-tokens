<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Tokens Exporter</title>
    <style>
      :root {
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        font-size: 12px;
        color: #1a1a1a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100vh;
      }
      h1 {
        font-size: 14px;
        margin: 0;
      }
      p.hint {
        margin: 0;
        color: #6b6b6b;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        font-size: 12px;
        font-weight: 600;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .primary {
        background: #0d99ff;
        color: #fff;
      }
      .secondary {
        background: #fff;
        border-color: #d9d9d9;
        color: #1a1a1a;
      }
      #status {
        min-height: 16px;
        color: #6b6b6b;
      }
      #status.error {
        color: #d92d20;
      }
      pre {
        flex: 1;
        margin: 0;
        overflow: auto;
        background: #f5f5f5;
        border: 1px solid #ececec;
        border-radius: 6px;
        padding: 10px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 11px;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <h1>Color Tokens Exporter</h1>
    <p class="hint">
      문서의 Color Style을 읽어 <code>tokens.json</code>으로 변환합니다.
    </p>

    <div class="actions">
      <button id="generate" class="primary">토큰 생성</button>
      <button id="download" class="secondary" disabled>tokens.json 다운로드</button>
    </div>

    <div id="status"></div>
    <pre id="preview">// 여기에 미리보기가 표시됩니다.</pre>

    <script type="module" src="./ui.ts"></script>
  </body>
</html>
